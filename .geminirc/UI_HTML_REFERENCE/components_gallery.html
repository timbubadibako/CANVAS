<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Artistic Component Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #0F172A; 
            color: #F8FAFC;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
        }
        .light-mode {
            background-color: #F8FAFC;
            color: #1E1B4B;
        }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .glass-card-dark { 
            background: rgba(30, 41, 59, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .glass-card-light { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.05);
        }
        .brush-accent {
            position: relative;
        }
        .brush-accent::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 8px;
            background: #6366F1;
            opacity: 0.4;
            border-radius: 100% 10% 100% 0%;
            z-index: -1;
        }
        .btn-paint {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .organic-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-16 text-center">
            <h1 class="text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-violet-400">
                CANVAS <span class="text-white">Studio</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto">Theme Flexibility: Artistic Dark & Clean Light</p>
        </header>

        <div class="grid md:grid-cols-2 gap-12">
            
            <!-- Dark Mode Sample -->
            <section class="space-y-8">
                <h2 class="text-2xl font-bold border-l-4 border-indigo-500 pl-4">Dark Studio</h2>
                <div class="glass-card-dark p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/10 organic-shape blur-2xl"></div>
                    <div class="relative z-10">
                        <h3 class="text-xl font-bold brush-accent inline-block mb-6">Dinner Mastery</h3>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                                <p class="text-2xl font-bold">640</p>
                                <p class="text-[10px] text-slate-500 font-bold">KCAL</p>
                            </div>
                            <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                                <p class="text-2xl font-bold">52g</p>
                                <p class="text-[10px] text-slate-500 font-bold">PROTEIN</p>
                            </div>
                        </div>
                        <button class="w-full py-3 btn-paint text-white font-bold rounded-xl">SAVE LAYER</button>
                    </div>
                </div>
            </section>

            <!-- Light Mode Sample -->
            <section class="space-y-8 light-mode p-8 rounded-[3rem] shadow-2xl">
                <h2 class="text-2xl font-bold border-l-4 border-indigo-500 pl-4">Light Studio</h2>
                <div class="glass-card-light p-8 rounded-[2.5rem] relative overflow-hidden group">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500/5 organic-shape blur-2xl"></div>
                    <div class="relative z-10">
                        <h3 class="text-xl font-bold brush-accent inline-block mb-6 text-slate-900">Breakfast Palette</h3>
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <p class="text-2xl font-bold text-slate-900">310</p>
                                <p class="text-[10px] text-slate-400 font-bold">KCAL</p>
                            </div>
                            <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                <p class="text-2xl font-bold text-slate-900">18g</p>
                                <p class="text-[10px] text-slate-400 font-bold">PROTEIN</p>
                            </div>
                        </div>
                        <button class="w-full py-3 btn-paint text-white font-bold rounded-xl">SAVE LAYER</button>
                    </div>
                </div>
            </section>

        </div>

        <!-- Inputs Transition -->
        <section class="mt-20 grid md:grid-cols-2 gap-12">
            <div class="glass-card-dark p-8 rounded-[2rem]">
                <label class="text-[10px] font-bold text-slate-500 mb-2 block tracking-widest">ARTIST NAME</label>
                <input type="text" value="Claude Monet" class="w-full bg-slate-900/50 border border-white/5 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div class="glass-card-light p-8 rounded-[2rem]">
                <label class="text-[10px] font-bold text-slate-400 mb-2 block tracking-widest">ARTIST NAME</label>
                <input type="text" value="Claude Monet" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-slate-900 focus:outline-none focus:border-indigo-500">
            </div>
        </section>
    </div>
</body>
</html>
