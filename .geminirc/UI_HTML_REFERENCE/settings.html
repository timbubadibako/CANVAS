<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    <!-- Header -->
    <header class="p-6 bg-white sticky top-0 z-10 border-b border-slate-50">
        <h1 class="text-2xl font-bold text-slate-900">Settings</h1>
    </header>

    <main class="p-6">
        <!-- AI Settings Section -->
        <section class="mb-10">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">AI Engine</h2>
            <div class="space-y-4">
                <!-- Toggle -->
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-3xl border border-slate-100">
                    <div>
                        <p class="font-bold text-slate-900">Hybrid Mode</p>
                        <p class="text-xs text-slate-500">Auto-switch to local AI</p>
                    </div>
                    <div class="relative inline-block w-12 h-6 rounded-full bg-emerald-500 transition-colors">
                        <div class="absolute left-7 top-1 w-4 h-4 bg-white rounded-full transition-all"></div>
                    </div>
                </div>

                <!-- Download Model Card -->
                <div class="p-6 bg-slate-900 rounded-[2.5rem] text-white">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="font-bold">Offline Model</h3>
                            <p class="text-xs text-slate-400">Nutrition5k Int8 • 85 MB</p>
                        </div>
                        <span class="px-3 py-1 bg-white/10 rounded-full text-[10px] font-bold">NOT INSTALLED</span>
                    </div>
                    <button class="w-full py-3 bg-emerald-500 text-white font-bold rounded-2xl flex items-center justify-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                        Download Model
                    </button>
                </div>
            </div>
        </section>

        <!-- App Settings -->
        <section class="mb-10">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">General</h2>
            <div class="divide-y divide-slate-50 bg-slate-50 rounded-3xl border border-slate-100 overflow-hidden">
                <button class="w-full p-4 flex justify-between items-center text-left hover:bg-slate-100 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="h-10 w-10 bg-white rounded-2xl flex items-center justify-center text-slate-600 shadow-sm text-lg">🔔</div>
                        <span class="font-bold text-slate-700">Notifications</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
                <button class="w-full p-4 flex justify-between items-center text-left hover:bg-slate-100 transition-colors">
                    <div class="flex items-center gap-4">
                        <div class="h-10 w-10 bg-white rounded-2xl flex items-center justify-center text-slate-600 shadow-sm text-lg">🌐</div>
                        <span class="font-bold text-slate-700">Language</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-slate-400 font-medium">English</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </div>
                </button>
            </div>
        </section>

        <!-- Logout -->
        <button class="w-full py-4 text-rose-500 font-bold bg-rose-50 rounded-[2rem] border border-rose-100">Sign Out</button>
        
        <p class="text-center mt-8 text-xs text-slate-400 font-medium">CANVAS v1.0.0-beta</p>
    </main>
</body>
</html>
