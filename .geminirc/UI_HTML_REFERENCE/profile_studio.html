<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Studio Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #0F172A; 
            color: #F8FAFC;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
        }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .organic-shape { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        .btn-paint { background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen p-8 flex flex-col">
    <!-- Header -->
    <header class="mb-12 flex items-center gap-6">
        <div class="h-20 w-20 organic-shape bg-gradient-to-tr from-indigo-500 to-violet-500 p-0.5 shadow-2xl">
            <div class="h-full w-full organic-shape bg-slate-900 overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
        <div>
            <h1 class="text-3xl font-bold">Studio <span class="text-indigo-400">Felix</span></h1>
            <p class="text-slate-500 text-sm font-bold uppercase tracking-widest mt-1">Elite Creator</p>
        </div>
    </header>

    <!-- Stats Matrix -->
    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="glass-card p-6 rounded-[2rem] text-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Height</p>
            <p class="text-2xl font-bold">178<span class="text-xs text-indigo-400 ml-1">cm</span></p>
        </div>
        <div class="glass-card p-6 rounded-[2rem] text-center">
            <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Weight</p>
            <p class="text-2xl font-bold">72.5<span class="text-xs text-indigo-400 ml-1">kg</span></p>
        </div>
    </div>

    <!-- Goals Canvas -->
    <section class="mb-12">
        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6">Goal Canvas</h2>
        <div class="glass-card p-8 rounded-[2.5rem] space-y-8">
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="text-xs font-bold uppercase tracking-widest">Calorie Goal</span>
                    <span class="text-indigo-400 font-bold">2,000 KCAL</span>
                </div>
                <div class="h-2 w-full bg-white/5 rounded-full relative overflow-hidden">
                    <div class="absolute inset-0 bg-indigo-500/20"></div>
                    <div class="h-full bg-indigo-500 w-1/2 rounded-full"></div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <div class="p-3 bg-white/5 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Pro</p>
                    <p class="font-bold text-sm">150g</p>
                </div>
                <div class="p-3 bg-white/5 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Carb</p>
                    <p class="font-bold text-sm">200g</p>
                </div>
                <div class="p-3 bg-white/5 rounded-2xl border border-white/5 text-center">
                    <p class="text-[8px] font-bold text-slate-500 uppercase">Fat</p>
                    <p class="font-bold text-sm">65g</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Account Actions -->
    <div class="space-y-4">
        <button class="w-full py-4 glass-card rounded-2xl font-bold flex items-center justify-between px-8">
            <span>Edit Profile</span>
            <svg class="h-5 w-5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
        </button>
        <button class="w-full py-4 bg-rose-500/10 text-rose-500 border border-rose-500/20 rounded-2xl font-bold transition-all hover:bg-rose-500/20">
            CLOSE STUDIO (LOGOUT)
        </button>
    </div>
</body>
</html>
