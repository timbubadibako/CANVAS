<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Light Studio Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #F8FAFC; 
            color: #1E1B4B;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
            padding-bottom: 100px;
        }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.05);
        }
        .organic-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        .nav-active { color: #6366F1; }
        .brush-accent {
            position: relative;
            z-index: 1;
        }
        .brush-accent::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: -4px;
            width: 105%;
            height: 12px;
            background: #6366F1;
            opacity: 0.15;
            z-index: -1;
            transform: skewX(-15deg);
        }
        .btn-paint {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative shadow-2xl bg-white">
    <!-- Header -->
    <header class="p-8 flex justify-between items-start">
        <div>
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1 text-indigo-500/60">Canvas Date: May 26</p>
            <h1 class="text-3xl font-bold text-slate-900">Studio <span class="brush-accent">Jri</span></h1>
        </div>
        <div class="h-14 w-14 organic-shape bg-gradient-to-tr from-indigo-500 to-violet-500 p-0.5 shadow-lg">
            <div class="h-full w-full organic-shape bg-white overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
    </header>

    <!-- Main Palette (Progress) -->
    <section class="px-8 mb-10">
        <div class="glass-card rounded-[3rem] p-8 relative overflow-hidden border border-indigo-100">
            <div class="absolute -top-12 -right-12 w-48 h-48 bg-indigo-500/5 organic-shape blur-3xl"></div>
            
            <div class="relative z-10">
                <p class="text-xs font-bold text-indigo-500 uppercase tracking-widest mb-2">Nutritional Composition</p>
                <div class="flex items-baseline gap-2 mb-8">
                    <h2 class="text-6xl font-bold text-slate-900">1,240</h2>
                    <span class="text-lg text-slate-400 font-medium">/ 2,000 KCAL</span>
                </div>

                <div class="space-y-6">
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400">
                            <span>Protein Base</span>
                            <span class="text-slate-900">98 / 150g</span>
                        </div>
                        <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-500 rounded-full" style="width: 65%"></div>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400">
                            <span>Energy Carbs</span>
                            <span class="text-slate-900">80 / 200g</span>
                        </div>
                        <div class="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                            <div class="h-full bg-emerald-500 rounded-full" style="width: 40%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Recent Masterpieces (Logs) -->
    <section class="px-8 mb-8">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-slate-900">Recent Layers</h3>
            <button class="text-indigo-600 text-xs font-bold uppercase tracking-widest">Gallery</button>
        </div>

        <div class="space-y-4">
            <!-- Log Item -->
            <div class="glass-card p-5 rounded-[2rem] flex items-center gap-5 border-l-4 border-indigo-500">
                <div class="h-16 w-16 bg-slate-50 organic-shape flex items-center justify-center text-2xl shadow-inner">🥗</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm text-slate-800">Garden Palette</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Lunch • 320 KCAL</p>
                </div>
                <div class="h-8 w-8 rounded-full bg-slate-100 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
                </div>
            </div>

            <!-- Log Item -->
            <div class="glass-card p-5 rounded-[2rem] flex items-center gap-5 border-l-4 border-emerald-500">
                <div class="h-16 w-16 bg-slate-50 organic-shape flex items-center justify-center text-2xl shadow-inner">☕</div>
                <div class="flex-1">
                    <h4 class="font-bold text-sm text-slate-800">Oatmilk Canvas</h4>
                    <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">Snack • 180 KCAL</p>
                </div>
                <div class="h-8 w-8 rounded-full bg-slate-100 flex items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-300" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd" /></svg>
                </div>
            </div>
        </div>
    </section>

    <!-- Bottom Palette (Nav) -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/90 backdrop-blur-2xl border-t border-slate-100 p-6 flex justify-between items-center px-10 rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.03)]">
        <button class="nav-active"><svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
        <button class="text-slate-300"><svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg></button>
        
        <button class="h-16 w-16 btn-paint rounded-full shadow-2xl shadow-indigo-500/40 flex items-center justify-center -translate-y-12 border-4 border-white transition-transform hover:scale-110 active:scale-95">
            <svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
        </button>

        <button class="text-slate-300"><svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg></button>
        <button class="text-slate-300"><svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg></button>
    </nav>
</body>
</html>
