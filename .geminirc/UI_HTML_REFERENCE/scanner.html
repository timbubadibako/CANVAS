<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Studio Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #000; color: white; }
        .organic-frame { 
            border: 2px solid rgba(99, 102, 241, 0.5); 
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            box-shadow: 0 0 40px rgba(99, 102, 241, 0.2);
        }
        .ai-glow { animation: glow 3s infinite alternate; }
        @keyframes glow { from { opacity: 0.3; } to { opacity: 1; } }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative overflow-hidden bg-slate-950">
    <!-- Camera Stream Placeholder -->
    <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1512621776951-a57141f2eefd?q=80&w=1000&auto=format&fit=crop')] bg-cover bg-center opacity-70"></div>

    <!-- UI Overlay -->
    <div class="relative z-10 h-screen flex flex-col p-8">
        <!-- Top Control -->
        <div class="flex justify-between items-center">
            <button class="h-12 w-12 glass-panel rounded-2xl flex items-center justify-center">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
            <div class="glass-panel px-5 py-2 rounded-full flex items-center gap-3">
                <div class="h-2 w-2 bg-indigo-500 rounded-full ai-glow"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Canvas AI Active</span>
            </div>
            <button class="h-12 w-12 glass-panel rounded-2xl flex items-center justify-center">
                <svg class="h-6 w-6 text-indigo-400" fill="currentColor" viewBox="0 0 20 20"><path d="M11 3a1 1 0 10-2 0v1a1 1 0 102 0V3zM15.657 5.757a1 1 0 00-1.414-1.414l-.707.707a1 1 0 001.414 1.414l.707-.707zM18 10a1 1 0 01-1 1h-1a1 1 0 110-2h1a1 1 0 011 1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zM5 10a1 1 0 01-1 1H3a1 1 0 110-2h1a1 1 0 011 1zM8 16v-1a1 1 0 10-2 0v1a1 1 0 102 0zM13 16v-1a1 1 0 10-2 0v1a1 1 0 102 0zM16.464 14.95a1 1 0 11-1.414 1.414l-.707-.707a1 1 0 111.414-1.414l.707.707z" /></svg>
            </button>
        </div>

        <!-- Frame -->
        <div class="flex-1 flex flex-col items-center justify-center">
            <div class="w-80 h-80 organic-frame relative flex items-center justify-center">
                <!-- Analysis Ticker -->
                <div class="absolute -top-10 left-1/2 -translate-x-1/2 whitespace-nowrap">
                    <span class="text-[10px] font-bold text-white/40 uppercase tracking-[0.3em]">Analyzing Texture & Volume...</span>
                </div>

                <!-- Focus Circle -->
                <div class="h-4 w-4 bg-white/20 rounded-full border border-white/40"></div>
                
                <!-- Bounding Box detected -->
                <div class="absolute top-1/4 left-1/4 w-32 h-32 border border-emerald-500/50 rounded-xl bg-emerald-500/5">
                    <div class="absolute -top-6 left-0 px-2 py-0.5 bg-emerald-500 text-[8px] font-bold rounded">VEGETABLE 92%</div>
                </div>
            </div>
        </div>

        <!-- Shutter & Tools -->
        <div class="mt-auto pb-10 flex flex-col items-center gap-8">
            <div class="flex gap-6 items-center">
                <button class="h-10 w-10 glass-panel rounded-full flex items-center justify-center text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                </button>
                <button class="h-24 w-24 rounded-full border-4 border-white/20 p-2 group active:scale-90 transition-transform">
                    <div class="h-full w-full bg-white rounded-full flex items-center justify-center group-hover:bg-indigo-400 transition-colors">
                        <div class="h-8 w-8 bg-slate-900 rounded-lg"></div>
                    </div>
                </button>
                <button class="h-10 w-10 glass-panel rounded-full flex items-center justify-center text-slate-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                </button>
            </div>
            
            <p class="text-[10px] font-bold text-white/30 uppercase tracking-[0.5em]">Artistic Multi-Angle Mode</p>
        </div>
    </div>
</body>
</html>
