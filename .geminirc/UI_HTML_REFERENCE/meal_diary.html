<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Meal Layers (History)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #0F172A; 
            color: #F8FAFC;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
        }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .organic-shape { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        .date-badge { background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen p-8 flex flex-col">
    <!-- Header -->
    <header class="mb-10 flex justify-between items-center">
        <h1 class="text-3xl font-bold">Meal <span class="text-indigo-400">Layers</span></h1>
        <button class="h-12 w-12 glass-card rounded-2xl flex items-center justify-center">
            <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
        </button>
    </header>

    <!-- History Content -->
    <div class="space-y-12">
        <!-- Date Group -->
        <section class="space-y-4">
            <div class="flex items-center gap-4">
                <span class="px-4 py-1 date-badge text-[10px] font-bold rounded-full uppercase tracking-widest">Today</span>
                <div class="h-px flex-1 bg-white/5"></div>
            </div>

            <div class="space-y-4">
                <!-- Log Item -->
                <div class="glass-card p-6 rounded-[2.5rem] relative overflow-hidden flex gap-6">
                    <div class="h-20 w-20 organic-shape bg-slate-800 flex items-center justify-center text-3xl shadow-2xl">🍣</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">Salmon Palette</h3>
                            <span class="text-[10px] font-bold text-slate-500">20:15</span>
                        </div>
                        <div class="flex gap-4 text-xs font-bold">
                            <span class="text-white">420 <span class="text-slate-500">kcal</span></span>
                            <span class="text-indigo-400">32g <span class="text-slate-500">p</span></span>
                            <span class="text-emerald-400">12g <span class="text-slate-500">f</span></span>
                        </div>
                    </div>
                </div>

                <!-- Log Item -->
                <div class="glass-card p-6 rounded-[2.5rem] relative overflow-hidden flex gap-6">
                    <div class="h-20 w-20 organic-shape bg-slate-800 flex items-center justify-center text-3xl shadow-2xl">🥗</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="font-bold text-lg">Green Canvas</h3>
                            <span class="text-[10px] font-bold text-slate-500">13:30</span>
                        </div>
                        <div class="flex gap-4 text-xs font-bold">
                            <span class="text-white">280 <span class="text-slate-500">kcal</span></span>
                            <span class="text-indigo-400">15g <span class="text-slate-500">p</span></span>
                            <span class="text-emerald-400">8g <span class="text-slate-500">f</span></span>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Date Group -->
        <section class="space-y-4">
            <div class="flex items-center gap-4">
                <span class="px-4 py-1 bg-white/5 border border-white/10 text-[10px] text-slate-400 font-bold rounded-full uppercase tracking-widest">Yesterday</span>
                <div class="h-px flex-1 bg-white/5"></div>
            </div>

            <div class="glass-card p-6 rounded-[2.5rem] relative overflow-hidden flex gap-6 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all">
                <div class="h-20 w-20 organic-shape bg-slate-800 flex items-center justify-center text-3xl">🍝</div>
                <div class="flex-1">
                    <h3 class="font-bold text-lg">Pasta Sketch</h3>
                    <div class="flex gap-4 text-xs font-bold mt-2">
                        <span class="text-white">650 <span class="text-slate-500">kcal</span></span>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
