<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Profile & Goals</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen shadow-2xl">
    <!-- Header -->
    <header class="p-6 flex items-center gap-4 bg-white sticky top-0 z-10 border-b border-slate-50">
        <button class="h-10 w-10 bg-slate-50 rounded-full flex items-center justify-center text-slate-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
        </button>
        <h1 class="text-xl font-bold text-slate-900">Profile & Goals</h1>
    </header>

    <main class="p-6">
        <!-- Physical Data Section -->
        <section class="mb-10">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Physical Stats</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                    <p class="text-xs text-slate-500 font-medium mb-1">Height</p>
                    <p class="text-xl font-bold text-slate-900">178 <span class="text-sm text-slate-400">cm</span></p>
                </div>
                <div class="p-4 bg-slate-50 rounded-3xl border border-slate-100">
                    <p class="text-xs text-slate-500 font-medium mb-1">Weight</p>
                    <p class="text-xl font-bold text-slate-900">72.5 <span class="text-sm text-slate-400">kg</span></p>
                </div>
            </div>
        </section>

        <!-- Goals Section -->
        <section class="mb-10">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Daily Targets</h2>
            <div class="space-y-4">
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-sm font-bold text-slate-700">Calorie Goal</label>
                        <span class="text-emerald-600 font-bold">2,000 kcal</span>
                    </div>
                    <input type="range" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-emerald-500" min="1000" max="4000" value="2000">
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <div class="p-3 bg-emerald-50 rounded-2xl border border-emerald-100">
                        <p class="text-[10px] font-bold text-emerald-600 uppercase">Protein</p>
                        <p class="font-bold text-slate-900">150g</p>
                    </div>
                    <div class="p-3 bg-orange-50 rounded-2xl border border-orange-100">
                        <p class="text-[10px] font-bold text-orange-600 uppercase">Carbs</p>
                        <p class="font-bold text-slate-900">200g</p>
                    </div>
                    <div class="p-3 bg-rose-50 rounded-2xl border border-rose-100">
                        <p class="text-[10px] font-bold text-rose-600 uppercase">Fat</p>
                        <p class="font-bold text-slate-900|">65g</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Diet Strategy -->
        <section class="mb-10">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">Diet Strategy</h2>
            <div class="space-y-3">
                <div class="flex items-center gap-4 p-4 bg-white rounded-3xl border-2 border-emerald-500">
                    <div class="h-10 w-10 bg-emerald-500 text-white rounded-2xl flex items-center justify-center font-bold">M</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900">Maintenance</h4>
                        <p class="text-xs text-slate-500">Keep current weight</p>
                    </div>
                    <div class="h-6 w-6 rounded-full border-4 border-emerald-500 bg-white"></div>
                </div>
                <div class="flex items-center gap-4 p-4 bg-slate-50 rounded-3xl border border-slate-100">
                    <div class="h-10 w-10 bg-slate-200 text-slate-500 rounded-2xl flex items-center justify-center font-bold">C</div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900 text-slate-500">Cutting</h4>
                        <p class="text-xs text-slate-400">Lose fat, keep muscle</p>
                    </div>
                </div>
            </div>
        </section>

        <button class="w-full py-4 bg-slate-900 text-white font-bold rounded-[2rem] shadow-xl shadow-slate-200">Save Changes</button>
    </main>
</body>
</html>
