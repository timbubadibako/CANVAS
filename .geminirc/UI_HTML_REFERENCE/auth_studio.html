<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANVAS - Studio Onboarding</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Open Sans', sans-serif; 
            background-color: #0F172A; 
            color: #F8FAFC;
            background-image: url('https://www.transparenttextures.com/patterns/canvas-orange.png');
        }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .organic-shape {
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
        }
        .btn-paint {
            background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%);
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .brush-accent::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: -5%;
            width: 110%;
            height: 12px;
            background: #6366F1;
            opacity: 0.3;
            z-index: -1;
            transform: skewX(-15deg);
        }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen relative overflow-hidden flex flex-col p-8">
    <!-- Animated Backdrop Shapes -->
    <div class="absolute -top-20 -left-20 w-64 h-64 bg-indigo-500/10 organic-shape blur-3xl animate-pulse"></div>
    <div class="absolute top-1/2 -right-20 w-80 h-80 bg-violet-500/5 organic-shape blur-3xl animate-pulse"></div>

    <!-- Onboarding Page -->
    <div id="onboarding" class="relative z-10 flex-1 flex flex-col justify-center text-center">
        <div class="mb-12">
            <div class="h-24 w-24 bg-gradient-to-tr from-indigo-500 to-violet-500 rounded-[2rem] mx-auto flex items-center justify-center shadow-2xl shadow-indigo-500/30">
                <svg class="h-12 w-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
            </div>
        </div>
        
        <h1 class="text-4xl font-bold mb-6">Master Your <br><span class="relative inline-block brush-accent">Nutrition</span></h1>
        <p class="text-slate-400 text-lg mb-12">Turn every meal into a masterpiece of health with AI-powered analysis.</p>

        <div class="space-y-4">
            <button onclick="showLogin()" class="w-full py-4 btn-paint text-white font-bold rounded-2xl transition-transform active:scale-95">START CREATING</button>
            <button class="w-full py-4 text-slate-500 font-bold hover:text-white transition-colors">EXPLORE GALLERY</button>
        </div>
    </div>

    <!-- Login Page (Hidden by default) -->
    <div id="login" class="hidden relative z-10 flex-1 flex flex-col justify-center">
        <button onclick="showOnboarding()" class="mb-8 text-slate-500 flex items-center gap-2 font-bold text-xs uppercase tracking-widest">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg> Back
        </button>

        <h2 class="text-3xl font-bold mb-2">Welcome Back</h2>
        <p class="text-slate-500 mb-10">Sign in to sync your canvas logs.</p>

        <form class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Studio Email</label>
                <input type="email" placeholder="artist@canvas.io" class="w-full bg-slate-900/50 border border-white/5 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Access Key</label>
                <input type="password" placeholder="••••••••" class="w-full bg-slate-900/50 border border-white/5 rounded-2xl px-5 py-4 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            </div>
            
            <div class="flex justify-between items-center text-xs font-bold">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="accent-indigo-500 h-4 w-4"> Remember Me
                </label>
                <a href="#" class="text-indigo-400">Forgot?</a>
            </div>

            <button type="submit" class="w-full py-4 btn-paint text-white font-bold rounded-2xl shadow-xl shadow-indigo-500/20">SIGN IN</button>
        </form>

        <p class="text-center mt-12 text-sm text-slate-500">
            Don't have a palette? <a href="#" class="text-indigo-400 font-bold">Sign Up</a>
        </p>
    </div>

    <script>
        function showLogin() {
            document.getElementById('onboarding').classList.add('hidden');
            document.getElementById('login').classList.remove('hidden');
        }
        function showOnboarding() {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('onboarding').classList.remove('hidden');
        }
    </script>
</body>
</html>
